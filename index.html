<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CamShare — 拍下你的尋人啟事</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-white min-h-screen flex items-center justify-center">

  <!-- Landscape lock overlay -->
  <div id="landscape-overlay">
    <svg class="landscape-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="4" y="7" width="16" height="10" rx="2" transform="rotate(-90 12 12)"/>
      <line x1="12" y1="17" x2="12" y2="17.01"/>
    </svg>
    <p class="landscape-text">請將手機轉為直屏使用</p>
    <p class="landscape-subtext">此活動頁面僅支援直屏模式</p>
  </div>

  <div id="app" class="w-full max-w-md mx-auto px-4 py-6 relative">

    <!-- Step 0: 進入頁 -->
    <section id="step-0" class="step-section active">
      <div class="text-center">
        <h1 class="text-4xl font-bold text-blue-900 mb-2">CamShare</h1>
        <p class="text-lg text-gray-500 mb-8">拍下你的尋人啟事</p>

        <!-- Mockup preview placeholder -->
        <div class="mockup-preview bg-gray-100 rounded-xl aspect-[3/4] max-w-xs mx-auto mb-8 flex items-center justify-center">
          <div class="text-center text-gray-400">
            <svg class="w-12 h-12 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
            </svg>
            <p class="text-sm">你的尋人啟事預覽</p>
          </div>
        </div>

        <button id="btn-start" class="btn-primary w-full py-3 rounded-lg text-lg font-semibold">
          開始
        </button>
      </div>
    </section>

    <!-- Step 1: 輸入資訊 -->
    <section id="step-1" class="step-section">
      <div>
        <h2 class="text-2xl font-bold text-blue-900 mb-6 text-center">填寫你的資訊</h2>

        <!-- 名字 -->
        <div class="mb-5">
          <label for="input-name" class="block text-sm font-medium text-gray-700 mb-1">名字 <span class="text-red-400">*</span></label>
          <input
            type="text"
            id="input-name"
            maxlength="20"
            required
            placeholder="輸入你的名字"
            class="input-field w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition"
          >
          <p id="name-error" class="text-red-400 text-xs mt-1 hidden">請輸入名字</p>
        </div>

        <!-- 性別 -->
        <div class="mb-5">
          <label class="block text-sm font-medium text-gray-700 mb-2">性別</label>
          <div id="gender-group" class="flex gap-3">
            <button type="button" data-gender="男" class="gender-btn flex-1 py-3 rounded-lg border-2 border-gray-300 font-medium transition">
              👨 男
            </button>
            <button type="button" data-gender="女" class="gender-btn flex-1 py-3 rounded-lg border-2 border-gray-300 font-medium transition">
              👩 女
            </button>
            <button type="button" data-gender="不指定" class="gender-btn flex-1 py-3 rounded-lg border-2 border-gray-300 font-medium transition">
              🌀 不指定
            </button>
          </div>
        </div>

        <!-- 年齡 -->
        <div class="mb-8">
          <label for="input-age" class="block text-sm font-medium text-gray-700 mb-1">年齡</label>
          <input
            type="number"
            id="input-age"
            min="1"
            max="120"
            placeholder="輸入年齡"
            class="input-field w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition"
          >
        </div>

        <button id="btn-next-step2" class="btn-primary w-full py-3 rounded-lg text-lg font-semibold" disabled>
          下一步
        </button>
      </div>
    </section>

    <!-- Step 2: 拍照 -->
    <section id="step-2" class="step-section">
      <div class="text-center">
        <h2 class="text-2xl font-bold text-blue-900 mb-4">拍照</h2>

        <!-- Camera container -->
        <div id="camera-container" class="camera-container">

          <!-- Loading spinner -->
          <div id="camera-loading" class="camera-loading" style="display:none;">
            <div class="camera-spinner"></div>
            <p class="text-sm text-gray-500 mt-3">正在開啟相機…</p>
          </div>

          <!-- Error message area -->
          <div id="camera-error" class="camera-error" style="display:none;">
            <svg class="w-12 h-12 mx-auto mb-3 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
            </svg>
            <p class="error-title text-lg font-semibold text-gray-800 mb-2"></p>
            <p class="error-body text-sm text-gray-600"></p>
          </div>

          <!-- Video stream -->
          <video id="camera-video" class="camera-video" playsinline muted autoplay></video>

          <!-- SVG poster frame overlay -->
          <div id="poster-overlay" class="poster-overlay" style="display:none;">
            <svg class="poster-overlay-svg" viewBox="0 0 360 480" preserveAspectRatio="xMidYMid meet">
              <!-- Top bar -->
              <rect x="0" y="0" width="360" height="90" fill="#1e3a5f" opacity="0.85"/>
              <!-- Title -->
              <text x="180" y="60" text-anchor="middle" font-size="32" font-weight="700" fill="#ffffff" font-family="sans-serif" letter-spacing="6">尋人啟事</text>
              <!-- Left bracket -->
              <path d="M 38 140 L 22 140 L 22 320 L 38 320" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
              <!-- Right bracket -->
              <path d="M 322 140 L 338 140 L 338 320 L 322 320" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
              <!-- Bottom bar -->
              <rect x="0" y="365" width="360" height="115" fill="#1e3a5f" opacity="0.85"/>
              <!-- Info labels -->
              <text x="180" y="400" text-anchor="middle" font-size="14" fill="#ffffff" font-family="sans-serif" opacity="0.7">
                <tspan x="180">姓名：_____________</tspan>
                <tspan x="180" dy="22">性別：_____　年齡：_____</tspan>
              </text>
              <!-- Bottom dots -->
              <circle cx="165" cy="462" r="3" fill="#ffffff" opacity="0.4"/>
              <circle cx="180" cy="462" r="3" fill="#93c5fd" opacity="0.7"/>
              <circle cx="195" cy="462" r="3" fill="#ffffff" opacity="0.4"/>
            </svg>
          </div>

          <!-- Face guide overlay -->
          <div id="face-guide" class="face-guide" style="display:none;">
            <div class="face-guide-oval"></div>
            <p class="face-guide-text">把臉對準這裡</p>
          </div>

          <!-- Photo preview -->
          <div id="photo-preview" class="photo-preview" style="display:none;">
            <img src="" alt="預覽照片" />
          </div>

        </div>

        <!-- Capture button -->
        <div id="capture-btn-wrap" class="capture-btn-wrap">
          <button id="btn-capture" class="btn-capture" style="display:none;">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/>
            </svg>
          </button>
        </div>

        <!-- Confirm / Retake buttons -->
        <div id="preview-btn-wrap" class="preview-btn-wrap" style="display:none;">
          <button id="btn-retake" class="btn-secondary flex-1 py-3 rounded-lg font-semibold">
            重拍
          </button>
          <button id="btn-confirm" class="btn-primary flex-1 py-3 rounded-lg font-semibold">
            確認
          </button>
        </div>

      </div>
    </section>

    <!-- Step 3: 生成結果 -->
    <section id="step-3" class="step-section">
      <div class="text-center">
        <h2 class="text-2xl font-bold text-blue-900 mb-6">你的尋人啟事</h2>

        <!-- Composite result area -->
        <div class="composite-area relative">
          <!-- Loading spinner -->
          <div id="composite-loading" class="composite-loading">
            <div class="composite-spinner"></div>
            <p class="text-sm text-gray-500 mt-3">正在生成你的尋人啟事</p>
            <p class="loading-text">正在生成...</p>
          </div>

          <!-- Result image -->
          <img id="composite-img" class="composite-img" src="" alt="你的尋人啟事" style="display:none;" />
        </div>

        <div class="flex gap-3 mt-6">
          <button id="btn-restart" class="btn-secondary flex-1 py-3 rounded-lg font-semibold">
            重新開始
          </button>
          <button id="btn-share" class="btn-primary flex-1 py-3 rounded-lg font-semibold" disabled>
            分享
          </button>
        </div>
      </div>
    </section>

    <!-- Step 4: 分享 -->
    <section id="step-4" class="step-section">
      <div class="text-center">
        <h2 class="text-2xl font-bold text-blue-900 mb-6">分享你的尋人啟事</h2>

        <!-- Final composite image -->
        <img id="share-img" class="composite-img scale-up" src="" alt="你的尋人啟事" />

        <!-- Action buttons -->
        <div class="share-actions mt-6">
          <button id="btn-web-share" class="btn-primary w-full py-3 rounded-lg font-semibold" style="display:none;">
            <svg class="inline w-5 h-5 mr-1 -mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/>
            </svg>
            分享圖片
          </button>

          <button id="btn-download" class="btn-secondary w-full py-3 rounded-lg font-semibold">
            <svg class="inline w-5 h-5 mr-1 -mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
            </svg>
            下載圖片
          </button>
        </div>

        <!-- iOS / WebView hint -->
        <p id="share-hint" class="share-hint text-sm text-gray-500 mt-3" style="display:none;">
          💡 長按圖片可儲存到相簿
        </p>

        <button id="btn-restart-final" class="btn-secondary w-full py-3 rounded-lg font-semibold mt-3">
          重新開始
        </button>
      </div>
    </section>

  </div>

  <script src="js/camera.js"></script>
  <script src="js/composite.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
