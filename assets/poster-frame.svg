<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 480" width="360" height="480">
  <!-- Background -->
  <rect width="360" height="480" fill="#ffffff"/>

  <!-- Outer border -->
  <rect x="12" y="12" width="336" height="456" rx="8" ry="8" fill="none" stroke="#1e3a5f" stroke-width="3"/>

  <!-- Top decorative line -->
  <line x1="40" y1="90" x2="320" y2="90" stroke="#d1d5db" stroke-width="1"/>

  <!-- Title: 尋人啟事 -->
  <text x="180" y="65" text-anchor="middle" font-family="'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', sans-serif" font-size="38" font-weight="700" fill="#1e3a5f" letter-spacing="8">尋人啟事</text>

  <!-- Subtitle line -->
  <line x1="100" y1="75" x2="260" y2="75" stroke="#93c5fd" stroke-width="2" stroke-linecap="round"/>

  <!-- Face oval cutout area (transparent, just decorative frame) -->
  <ellipse cx="180" cy="230" rx="100" ry="125" fill="none" stroke="#e5e7eb" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- Left decorative bracket -->
  <path d="M 50 140 L 35 140 L 35 320 L 50 320" fill="none" stroke="#d1d5db" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Right decorative bracket -->
  <path d="M 310 140 L 325 140 L 325 320 L 310 320" fill="none" stroke="#d1d5db" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Divider line above info area -->
  <line x1="60" y1="370" x2="300" y2="370" stroke="#d1d5db" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Info fields (labels) -->
  <text x="180" y="400" text-anchor="middle" font-family="'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', sans-serif" font-size="15" fill="#9ca3af">
    <tspan x="180" dy="0">姓名：_____________</tspan>
    <tspan x="180" dy="24">性別：_____  年齡：_____</tspan>
  </text>

  <!-- Bottom decorative dots -->
  <circle cx="160" cy="456" r="3" fill="#d1d5db"/>
  <circle cx="180" cy="456" r="3" fill="#93c5fd"/>
  <circle cx="200" cy="456" r="3" fill="#d1d5db"/>
</svg>